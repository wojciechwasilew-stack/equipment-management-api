spring:
  datasource:
    url: jdbc:h2:mem:equipment_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  jackson:
    serialization:
      write-dates-as-timestamps: false

rabbitmq:
  queue:
    allocation-created: allocation.created.queue
  exchange:
    allocation: allocation.exchange
  routing-key:
    allocation-created: allocation.created

rate-limit:
  requests-per-minute: 100
